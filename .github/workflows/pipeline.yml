name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: Pipeline action
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy

jobs:
  terraform:
    name: Provision Infrastructure
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Download Terraform State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: terraform-state
          path: terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -var="ssh_key_name=${{ secrets.EC2_KEY_NAME }}"

      - name: Terraform Apply
        id: terraform-apply
        run: terraform apply -auto-approve tfplan

      - name: Export Instance IPs
        id: export
        run: |
          IPS=$(terraform output -json server_public_ips | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT

      - name: Upload Terraform State
        if: always() && (steps.terraform-apply.outcome == 'success' || steps.terraform-apply.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform/terraform.tfstate
          retention-days: 30
          if-no-files-found: ignore

  ansible:
    name: Configure Servers
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible jq

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Generate Inventory
        run: |
          echo "[web]" > inventory.ini
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            echo "$ip ansible_user=ec2-user ansible_ssh_private_key_file=key.pem" >> inventory.ini
          done
          cat inventory.ini

      - name: Run Ansible Deployment
        run: ansible-playbook -i inventory.ini ansible/deploy.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

  destroy:
    name: Destroy Infrastructure (Manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Download Terraform State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: terraform

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var="ssh_key_name=${{ secrets.EC2_KEY_NAME }}"
