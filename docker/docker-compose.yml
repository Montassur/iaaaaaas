services:
  mongo:
    image: mongo:6
    container_name: ecommerce-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - ecommerce

  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: ecommerce-app
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/shop
      PORT: "3000"
    depends_on:
      - mongo
    networks:
      - ecommerce

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - ecommerce

volumes:
  mongo_data:

networks:
  ecommerce:
    driver: bridge
