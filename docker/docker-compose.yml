services:
  mongo:
    image: mongo:6
    container_name: marketplace-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-store}
    volumes:
      - db_data:/data/db
    networks:
      - marketplace

  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: marketplace-app
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-changeme}@mongo:27017/${MONGO_DB:-store}?authSource=admin
      PORT: "3000"
    depends_on:
      - mongo
    networks:
      - marketplace

  nginx:
    image: nginx:alpine
    container_name: marketplace-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - marketplace

volumes:
  db_data:

networks:
  marketplace:
    driver: bridge
